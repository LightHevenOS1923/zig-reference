<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZigHub - Complete Zig Programming Platform</title>
<meta name="description" content="The complete Zig programming platform: bilingual reference, social network, code sharing, tutorials, and community for Zig developers.">
<meta name="keywords" content="Zig, Zig language, Zig programming, Zig community, Zig Arabic, مرجع Zig">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-l">
    <button class="mm" onclick="document.querySelector('.side').classList.toggle('open')"><span></span><span></span><span></span></button>
    <div class="logo"></div>
    <div class="brand" onclick="navigate('feed')">Zig<span style="color:var(--accent)">Hub</span></div>
  </div>
  <div class="nav-c">
    <a data-v="feed" onclick="navigate('feed')"><span>🏠</span> <span class="n">Feed</span></a>
    <a data-v="explore" onclick="navigate('explore')"><span>🔥</span> <span class="n">Explore</span></a>
    <a data-v="learn" onclick="navigate('learn')"><span>📖</span> <span class="n">Learn</span></a>
    <a data-v="community" onclick="navigate('community')"><span>🌍</span> <span class="n">Community</span></a>
  </div>
  <div class="nav-r">
    <div class="avatar" onclick="navigate('profile')" id="navAvatar">Z</div>
  </div>
</nav>

<div class="layout">
  <aside class="side">
    <div class="side-l active" data-v="feed" onclick="navigate('feed')"><span>🏠</span> Feed</div>
    <div class="side-l" data-v="explore" onclick="navigate('explore')"><span>🔥</span> Explore</div>
    <div class="side-l" data-v="learn" onclick="navigate('learn')"><span>📖</span> Learn</div>
    <div class="side-l" data-v="community" onclick="navigate('community')"><span>🌍</span> Community</div>
    <div class="side-d"></div>
    <div class="side-h">Account</div>
    <div class="side-l" data-v="profile" onclick="navigate('profile')"><span>👤</span> Profile</div>
    <div class="side-l" data-v="login" onclick="navigate('login')"><span>🔑</span> Sign In</div>
    <div class="side-d"></div>
    <div class="side-h">Resources</div>
    <div class="side-l" onclick="window.open('reference.html','_blank')"><span>📘</span> Reference</div>
    <div class="side-l" onclick="window.open('https://ziglang.org','_blank')"><span>🔗</span> ziglang.org</div>
  </aside>

  <main class="main" id="main">
    <div class="spin"><div class="logo" style="width:20px;height:20px;"></div> Loading...</div>
  </main>
</div>

<div class="mod" id="postModal">
  <div class="mod-c">
    <h3>New Post</h3>
    <textarea class="input" id="postText" placeholder="Share something about Zig..."></textarea>
    <textarea class="input" id="postCode" placeholder="Optional: Zig code example" style="font-family:var(--mono);min-height:60px;"></textarea>
    <div class="mod-f">
      <button class="btn btn-o btn-s" onclick="document.getElementById('postModal').classList.remove('on')">Cancel</button>
      <button class="btn btn-p btn-s" onclick="submitPost()">Post</button>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// Supabase URL and Key for production - paste from supabase.com
const SUPABASE_URL = '';
const SUPABASE_KEY = '';
</script>
<script src="app.js"></script>
</body>
</html>
