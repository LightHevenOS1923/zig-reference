<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZigHub - Zig Programming Community</title>
<meta name="description" content="ZigHub - The complete Zig programming community. Bilingual reference, social feed, projects, tutorials, and more.">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="topnav">
  <div class="topnav-left">
    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="topnav-logo">
      <div class="logo-icon"></div>
      <span>Zig<span style="color:var(--accent)">Hub</span></span>
    </div>
  </div>
  <div class="topnav-search">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search ZigHub...">
  </div>
  <div class="topnav-right">
    <a class="nav-link active" data-view="feed" onclick="navigate('feed')"><span>🏠</span> <span>Home</span></a>
    <a class="nav-link" data-view="explore" onclick="navigate('explore')"><span>🔥</span> <span>Explore</span></a>
    <a class="nav-link" data-view="learn" onclick="navigate('learn')"><span>📖</span> <span>Learn</span></a>
    <a class="nav-link" data-view="community" onclick="navigate('community')"><span>🌍</span> <span>Community</span></a>
    <div class="topnav-avatar" onclick="navigate('profile')">Z</div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-link active" data-view="feed" onclick="navigate('feed')">
      <span class="icon">🏠</span> Feed
    </div>
    <div class="sidebar-link" data-view="explore" onclick="navigate('explore')">
      <span class="icon">🔥</span> Explore
    </div>
    <div class="sidebar-link" data-view="learn" onclick="navigate('learn')">
      <span class="icon">📖</span> Learn
    </div>
    <div class="sidebar-link" data-view="community" onclick="navigate('community')">
      <span class="icon">🌍</span> Community
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Account</div>
    <div class="sidebar-link" data-view="profile" onclick="navigate('profile')">
      <span class="icon">👤</span> Profile
    </div>
    <div class="sidebar-link" data-view="login" onclick="navigate('login')">
      <span class="icon">🔑</span> Sign In
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Resources</div>
    <div class="sidebar-link" onclick="window.open('reference.html','_blank')">
      <span class="icon">📘</span> Full Reference
    </div>
    <div class="sidebar-link" onclick="window.open('https://ziglang.org','_blank')">
      <span class="icon">🔗</span> ziglang.org
    </div>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
